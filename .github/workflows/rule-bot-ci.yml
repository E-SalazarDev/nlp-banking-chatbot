name: ChatBot CI

on:
  push:
    branches:
      - main
      - feature/github-actions
  pull_request:
    branches:
      - main

jobs:
  rule-bot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall llm_bot rule_bot tests

      - name: Run rule-based chatbot tests
        run: |
          python -m tests.pruebas_rule_bot > rule_bot_results.txt

      - name: Upload rule bot results
        uses: actions/upload-artifact@v4
        with:
          name: rule-bot-results
          path: rule_bot_results.txt