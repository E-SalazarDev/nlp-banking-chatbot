name: Chatbot MLOps CI

on:
  push:
    branches:
      - main
      - feature/github-actions
      - feature/actions-artifacts
      - feature/mlops-evaluation
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  chatbot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall llm_bot rule_bot tests evaluation

      - name: Create results folders
        run: |
          mkdir -p results
          mkdir -p evaluation/reports

      - name: Run rule-based chatbot tests
        run: |
          python -m tests.pruebas_rule_bot > results/rule_bot_results.txt

      - name: Run rule bot evaluation
        run: |
          python evaluation/evaluate_rule_bot.py > results/evaluation_output.txt

      - name: Generate metrics report
        run: |
          python evaluation/metrics_report.py

      - name: Create artifact README
        run: |
          echo "Chatbot MLOps Test Results" > results/README_RESULTS.txt
          echo "==========================" >> results/README_RESULTS.txt
          echo "" >> results/README_RESULTS.txt
          echo "This artifact contains the automated execution and evaluation results generated by GitHub Actions." >> results/README_RESULTS.txt
          echo "" >> results/README_RESULTS.txt
          echo "Files included:" >> results/README_RESULTS.txt
          echo "- rule_bot_results.txt: Output of the rule-based chatbot tests." >> results/README_RESULTS.txt
          echo "- evaluation_output.txt: Evaluation output with prediction results." >> results/README_RESULTS.txt
          echo "- metrics.json: Quantitative metrics generated from the evaluation dataset." >> results/README_RESULTS.txt
          echo "" >> results/README_RESULTS.txt
          echo "MLOps/LLMOps note:" >> results/README_RESULTS.txt
          echo "The CI pipeline validates syntax, installs dependencies, executes tests, evaluates intent detection, generates metrics, and uploads artifacts." >> results/README_RESULTS.txt
          echo "" >> results/README_RESULTS.txt
          echo "The LLM chatbot requires Ollama and Llama 3.2 running locally, so it is documented and tested locally but not executed in this GitHub Actions workflow." >> results/README_RESULTS.txt

      - name: Upload chatbot MLOps results
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-mlops-results
          path: |
            results/
            evaluation/reports/